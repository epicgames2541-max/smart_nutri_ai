name: Build Flutter APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # استبدل كلمة YOUR_FOLDER_NAME باسم المجلد اللي فيه ملف pubspec.yaml
        run: flutter pub get
        working-directory: ./smart_nutri_ai 

      - name: Build APK
        run: flutter build apk --debug
        working-directory: ./smart_nutri_ai

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: smart_nutri_ai/build/app/outputs/flutter-apk/app-debug.apk
